<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Isometric cube faces outline -->
    <polyline points="100,40 160,70 160,130 100,160 40,130 40,70 100,40"/>
    <!-- Internal edges to define 3 visible faces -->
    <line x1="100" y1="40" x2="100" y2="160"/>
    <line x1="160" y1="70" x2="160" y2="130"/>
    <line x1="40" y1="70" x2="40" y2="130"/>
    <line x1="100" y1="160" x2="160" y2="130"/>
    <line x1="100" y1="160" x2="40" y2="130"/>
  </g>
</svg>
