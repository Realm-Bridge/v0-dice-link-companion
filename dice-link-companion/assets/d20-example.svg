<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradient for top face (lightest) -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for left face (medium) -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for right face (darkest) -->
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b21b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b0764;stop-opacity:1" />
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Isometric d20 shape - simplified icosahedron view -->
  <g filter="url(#shadow)">
    <!-- Top triangular face -->
    <polygon points="50,10 20,40 80,40" fill="url(#topFace)" stroke="#2e1065" stroke-width="1"/>
    
    <!-- Left face -->
    <polygon points="20,40 50,10 35,55" fill="url(#leftFace)" stroke="#2e1065" stroke-width="1"/>
    <polygon points="20,40 35,55 25,70" fill="url(#leftFace)" stroke="#2e1065" stroke-width="1"/>
    
    <!-- Right face -->
    <polygon points="80,40 50,10 65,55" fill="url(#rightFace)" stroke="#2e1065" stroke-width="1"/>
    <polygon points="80,40 65,55 75,70" fill="url(#rightFace)" stroke="#2e1065" stroke-width="1"/>
    
    <!-- Center face -->
    <polygon points="35,55 65,55 50,85" fill="url(#topFace)" stroke="#2e1065" stroke-width="1"/>
    
    <!-- Bottom left -->
    <polygon points="25,70 35,55 50,85" fill="url(#leftFace)" stroke="#2e1065" stroke-width="1"/>
    
    <!-- Bottom right -->
    <polygon points="75,70 65,55 50,85" fill="url(#rightFace)" stroke="#2e1065" stroke-width="1"/>
  </g>
  
  <!-- Number on the center face -->
  <text x="50" y="58" 
        font-family="Arial, sans-serif" 
        font-size="18" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle" 
        dominant-baseline="middle"
        style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">20</text>
</svg>
