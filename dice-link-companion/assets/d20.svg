<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- D20 Icosahedron - Clean outlined style, no numbers -->
  <!-- Based on reference: isometric view from above-front -->
  
  <!-- Drop shadow for depth -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Main die group with shadow -->
  <g filter="url(#shadow)">
    <!-- Outer hexagonal boundary -->
    <polygon 
      points="50,5 92,27 92,73 50,95 8,73 8,27" 
      fill="#fff" 
      stroke="#1a3a3a" 
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    
    <!-- Inner triangular faces - upper section -->
    <!-- Top center triangle (main face for number) -->
    <polygon 
      points="50,5 72,38 28,38" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Upper left face -->
    <polygon 
      points="50,5 8,27 28,38" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Upper right face -->
    <polygon 
      points="50,5 92,27 72,38" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Middle section faces -->
    <!-- Left upper-middle -->
    <polygon 
      points="8,27 28,38 8,55" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Right upper-middle -->
    <polygon 
      points="92,27 72,38 92,55" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Center upper diamond area - split into triangles -->
    <polygon 
      points="28,38 50,55 8,55" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <polygon 
      points="72,38 50,55 92,55" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <polygon 
      points="28,38 72,38 50,55" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Lower section faces -->
    <!-- Left lower-middle -->
    <polygon 
      points="8,55 28,72 8,73" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Right lower-middle -->
    <polygon 
      points="92,55 72,72 92,73" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Center lower area -->
    <polygon 
      points="50,55 28,72 8,55" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <polygon 
      points="50,55 72,72 92,55" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <polygon 
      points="50,55 28,72 72,72" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <!-- Bottom faces -->
    <polygon 
      points="8,73 28,72 50,95" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <polygon 
      points="92,73 72,72 50,95" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
    
    <polygon 
      points="28,72 72,72 50,95" 
      fill="none" 
      stroke="#1a3a3a" 
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>
</svg>
