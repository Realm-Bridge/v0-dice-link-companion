<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top point -->
    <line x1="128" y1="20" x2="50" y2="100"/>
    <line x1="128" y1="20" x2="206" y2="100"/>
    <!-- Upper left face -->
    <line x1="50" y1="100" x2="80" y2="180"/>
    <!-- Upper right face -->
    <line x1="206" y1="100" x2="176" y2="180"/>
    <!-- Middle vertical edges -->
    <line x1="50" y1="100" x2="128" y2="160"/>
    <line x1="206" y1="100" x2="128" y2="160"/>
    <!-- Bottom edges -->
    <line x1="80" y1="180" x2="128" y2="236"/>
    <line x1="176" y1="180" x2="128" y2="236"/>
    <!-- Left and right base edges -->
    <line x1="80" y1="180" x2="176" y2="180"/>
  </g>
</svg>
