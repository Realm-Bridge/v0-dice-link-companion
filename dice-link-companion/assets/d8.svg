<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top pyramid -->
    <polyline points="128,20 200,80 128,110"/>
    <polyline points="128,20 56,80 128,110"/>
    <!-- Bottom pyramid -->
    <polyline points="128,110 200,170 128,236"/>
    <polyline points="128,110 56,170 128,236"/>
    <!-- Connecting edges -->
    <line x1="200" y1="80" x2="200" y2="170"/>
    <line x1="56" y1="80" x2="56" y2="170"/>
  </g>
</svg>
